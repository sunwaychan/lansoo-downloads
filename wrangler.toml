name = "lansoo-downloads"
pages_build_output_dir = "dist"

# D1 数据库绑定
# 部署前需要替换 database_id：
#   1. 运行: wrangler d1 create lansoo-software
#   2. 把输出的 id 填到下面
[[d1_databases]]
binding = "DB"
database_name = "lansoo-software"
database_id = "fd7e2842-8cf3-4bee-907c-169ab75d5394"

# 注意：ADMIN_PASSWORD 不要写在这里！
# 在 Cloudflare Dashboard → Pages → Settings → Environment variables 中设置